<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    PandaStack tile — mark on a dark rounded square.
    Universal asset: favicons, nav/sidebar logos, social avatars, app icons.
    Works identically on light and dark surfaces. The eye cutouts reveal the
    dark tile, giving the panda its black eye patches.
  -->
  <defs>
    <mask id="ps-face-t">
      <rect width="240" height="240" fill="black"/>
      <circle cx="64"  cy="46" r="24" fill="white"/>
      <circle cx="176" cy="46" r="24" fill="white"/>
      <rect x="32" y="44" width="176" height="72" rx="34" fill="white"/>
      <ellipse cx="89"  cy="82" rx="14" ry="20" transform="rotate(-20 89 82)"  fill="black"/>
      <ellipse cx="151" cy="82" rx="14" ry="20" transform="rotate(20 151 82)" fill="black"/>
    </mask>
  </defs>

  <!-- tile -->
  <rect width="240" height="240" rx="52" fill="#0B0F14"/>

  <g transform="translate(26 27) scale(0.783)">
    <!-- layer 1: head (white face; cutouts reveal dark tile = black patches) -->
    <rect width="240" height="240" fill="#F8FAFC" mask="url(#ps-face-t)"/>
    <circle cx="91"  cy="81" r="6.5" fill="#F8FAFC"/>
    <circle cx="149" cy="81" r="6.5" fill="#F8FAFC"/>

    <!-- layer 2: platform -->
    <rect x="48" y="132" width="144" height="28" rx="14" fill="#F8FAFC"/>

    <!-- layer 3: Firecracker foundation (accent) -->
    <rect x="64" y="176" width="112" height="28" rx="14" fill="#FF5A1F"/>
  </g>
</svg>

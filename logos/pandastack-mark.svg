<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    PandaStack mark — "Layered Panda" (primary, for light backgrounds)
    One shape, three meanings:
      • panda  (ears + eye patches)
      • stack  (three layers: sandboxes / databases / apps on a platform)
      • Firecracker engine (accent foundation layer, #FF5A1F)
    Eyes are true mask cutouts, so the mark works on any background.
  -->
  <defs>
    <mask id="ps-face">
      <rect width="240" height="240" fill="black"/>
      <!-- ears -->
      <circle cx="64"  cy="46" r="24" fill="white"/>
      <circle cx="176" cy="46" r="24" fill="white"/>
      <!-- head = top layer -->
      <rect x="32" y="44" width="176" height="72" rx="34" fill="white"/>
      <!-- eye-patch cutouts -->
      <ellipse cx="89"  cy="82" rx="14" ry="20" transform="rotate(-20 89 82)"  fill="black"/>
      <ellipse cx="151" cy="82" rx="14" ry="20" transform="rotate(20 151 82)" fill="black"/>
    </mask>
  </defs>

  <!-- layer 1: head -->
  <rect width="240" height="240" fill="#0B0F14" mask="url(#ps-face)"/>
  <!-- pupils (float inside the transparent patches) -->
  <circle cx="91"  cy="81" r="6.5" fill="#0B0F14"/>
  <circle cx="149" cy="81" r="6.5" fill="#0B0F14"/>

  <!-- layer 2: platform -->
  <rect x="48" y="132" width="144" height="28" rx="14" fill="#0B0F14"/>

  <!-- layer 3: Firecracker foundation (accent) -->
  <rect x="64" y="176" width="112" height="28" rx="14" fill="#FF5A1F"/>
</svg>

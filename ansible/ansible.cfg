[defaults]
inventory            = inventory/gcp.yml
roles_path           = roles
host_key_checking    = False
retry_files_enabled  = False
# Readable YAML task output. Use the built-in default callback's result_format
# (ansible-core >= 2.13) rather than the old community.general.yaml callback,
# which was REMOVED in community.general v12 — CI installs the latest collection
# unpinned, so the short name `yaml` would fail to resolve there.
stdout_callback      = default
result_format        = yaml
# Agent VMs are autoscaled and ephemeral; gather only what roles need (fast).
gathering            = smart
fact_caching         = jsonfile
fact_caching_connection = .factcache
fact_caching_timeout = 3600
interpreter_python   = /usr/bin/python3
# Keep output readable when pushing to a small fleet.
forks                = 10

[ssh_connection]
# Persist the IAP tunnel + SSH master across tasks so we pay the ~10-20s
# tunnel cold-start ONCE per host per run instead of per task.
pipelining           = True
control_path         = /tmp/ansible-ssh-%%h-%%p-%%r
ssh_args             = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=15 -o ServerAliveCountMax=4
timeout              = 60

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root

---
# Update fleet-wide, non-secret agent env knobs (e.g. roll out a new tunable
# from group_vars/all.yml) and restart the agent to pick them up. Secret +
# per-host lines are never touched.
- name: Manage agent env knobs
  hosts: agents
  gather_facts: false
  serial: 1
  handlers:
    - name: restart pandastack-agent
      ansible.builtin.systemd:
        name: "{{ agent_service }}"
        state: restarted
      when: agent_restart_on_change | bool
  roles:
    - common
    - agent_env

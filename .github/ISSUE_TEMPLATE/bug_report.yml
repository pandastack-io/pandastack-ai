name: Bug report
description: Report something that is broken or surprising
title: "bug: "
labels: [bug, status/triage]
body:
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: Describe the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Please include a minimal repro when possible.
      placeholder: |
        1. Start PandaStack with ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, PandaStack version or commit, and `pandastack version` output when available.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs with secrets and tokens removed.
      render: shell

[databases]
; Route all databases through local Postgres.
; Specific databases listed here are available directly;
; the wildcard catches anything dynamically created via the broker.
pandastack = host=127.0.0.1 port=5432 dbname=pandastack
* = host=127.0.0.1 port=5432

[pgbouncer]
logfile                 = /var/log/pgbouncer/pgbouncer.log
pidfile                 = /var/run/pgbouncer/pgbouncer.pid

listen_addr             = 127.0.0.1
listen_port             = 6432

auth_type               = scram-sha-256
auth_file               = /etc/pgbouncer/userlist.txt

; Pool mode: transaction pooling is most efficient for AI-agent workloads
; (short, bursty queries). Statement mode is too aggressive; session mode
; wastes connections.
pool_mode               = transaction
default_pool_size       = 25
min_pool_size           = 5
reserve_pool_size       = 5
reserve_pool_timeout    = 3
max_client_conn         = 500
max_db_connections      = 50

; Timeouts (in seconds)
server_connect_timeout  = 5
server_login_retry      = 3
client_login_timeout    = 10
server_idle_timeout     = 600
; never disconnect idle clients
client_idle_timeout     = 0

; Connection lifetime management
; recycle connections hourly
server_lifetime         = 3600
server_reset_query      = DISCARD ALL

; Healthcheck
server_check_query      = SELECT 1
server_check_delay      = 30

; Logging
log_connections         = 0
log_disconnections      = 0
log_pooler_errors       = 1
stats_period            = 60

; Admin
admin_users             = pandastack
stats_users             = pandastack

; TCP keepalive (detect dead connections quickly)
tcp_keepalive           = 1
tcp_keepidle            = 10
tcp_keepintvl           = 5
tcp_keepcnt             = 3

# postgresql.conf — PandaStack postgres-16 template
# Tuned for AI-agent workloads: fast writes, sub-millisecond reads, fork-friendly snapshots.

# ── Data directory ───────────────────────────────────────────────────────────
# Required — pg_ctlcluster needs this to locate the cluster on disk.
data_directory              = '/var/lib/postgresql/16/main'

# ── Connection ────────────────────────────────────────────────────────────────
listen_addresses            = '*'   # all interfaces; tunnel proxies externally
port                        = 5432
max_connections             = 200           # headroom for pgbouncer + direct psql

# ── Memory ───────────────────────────────────────────────────────────────────
shared_buffers              = 256MB         # ~25% of 1GB baseline
effective_cache_size        = 768MB
work_mem                    = 8MB
maintenance_work_mem        = 64MB
huge_pages                  = off           # not available in Firecracker guests

# ── WAL ──────────────────────────────────────────────────────────────────────
wal_level                   = logical       # enable replication + logical decoding
max_wal_size                = 256MB
min_wal_size                = 32MB
wal_buffers                 = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout          = 5min

# ── Replication (dormant by default; activated when slots are created) ────────
max_replication_slots       = 5
max_wal_senders             = 5
wal_keep_size               = 64MB

# ── Performance ──────────────────────────────────────────────────────────────
random_page_cost            = 1.1           # treat storage as SSD/in-memory
effective_io_concurrency    = 200
default_statistics_target   = 200           # better query plans
jit                         = off           # deterministic latency; JIT warm-up hurts short queries

# ── Autovacuum (aggressive for short-lived AI workloads) ──────────────────────
autovacuum                  = on
autovacuum_max_workers      = 3
autovacuum_naptime          = 10s
autovacuum_vacuum_scale_factor   = 0.01     # vacuum after 1% table change
autovacuum_analyze_scale_factor  = 0.005    # analyze after 0.5%
autovacuum_vacuum_cost_delay     = 2ms

# ── Logging ──────────────────────────────────────────────────────────────────
logging_collector           = off           # stream to journald via stderr
log_destination             = 'stderr'
log_min_duration_statement  = 500           # log slow queries ≥500ms
log_line_prefix             = '%t [%p] db=%d app=%a '
log_checkpoints             = on
log_connections             = off           # too noisy with pgbouncer
log_disconnections          = off
log_lock_waits              = on
log_temp_files              = 4MB
log_autovacuum_min_duration = 250ms

# ── Extensions ───────────────────────────────────────────────────────────────
shared_preload_libraries    = 'pg_stat_statements,auto_explain'
pg_stat_statements.max      = 5000
pg_stat_statements.track    = all
auto_explain.log_min_duration = 1000        # explain plans for queries ≥1s
auto_explain.log_analyze    = on
auto_explain.log_buffers    = on

# ── Miscellaneous ────────────────────────────────────────────────────────────
timezone                    = 'UTC'
lc_messages                 = 'en_US.UTF-8'
lc_monetary                 = 'en_US.UTF-8'
lc_numeric                  = 'en_US.UTF-8'
lc_time                     = 'en_US.UTF-8'
default_text_search_config  = 'pg_catalog.english'
idle_in_transaction_session_timeout = 30000  # 30s; prevents hung transactions
statement_timeout           = 0              # broker enforces its own per-query timeout
lock_timeout                = 5000           # 5s lock wait
deadlock_timeout            = 1000           # 1s deadlock detection

# pg_hba.conf — PandaStack postgres-16 template
# Authentication: local unix socket uses trust (systemd-managed services only).
# TCP is restricted to loopback; all external access is via the broker.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Allow postgres superuser via unix socket (for admin and init scripts).
local   all             postgres                                peer

# Allow the pandastack app user via unix socket (pgbouncer uses this).
local   all             pandastack                              scram-sha-256

# Replication via unix socket (for logical replication slots if needed).
local   replication     pandastack                              scram-sha-256

# TCP loopback — broker and pgbouncer connect here.
host    all             pandastack      127.0.0.1/32            scram-sha-256
host    all             pandastack      ::1/128                 scram-sha-256

# TAP/host network — db-proxy tunnel arrives as an unencrypted TCP stream
# from the agent host IP. The microVM is fully isolated so any-host is safe.
host    all             pandastack      0.0.0.0/0               scram-sha-256
host    all             pandastack      ::/0                    scram-sha-256

# Replication over loopback (for standby or logical consumers).
host    replication     pandastack      127.0.0.1/32            scram-sha-256
